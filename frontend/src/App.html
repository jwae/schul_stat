<div class="page">
  <template v-if="showDatabaseConnectStep">
    <DatabaseConnectPanel
      v-model:host="host"
      v-model:port="port"
      v-model:database="database"
      v-model:db-user="dbUsername"
      v-model:db-password="dbPassword"
      :error="error"
      :error-details="errorDetails"
      :error-code="errorCode"
      :connecting="connecting"
      :server-connected="serverConnected"
      :server-status="serverStatus"
      @connect="connectDatabase"
      @continue="continueAfterDatabaseConnect"
    />
  </template>

  <template v-else-if="showAppManagement && pendingLogin && isPendingAdmin">
    <APPManagement
      :token="pendingLogin?.token || ''"
      :user="pendingLoginUser"
      :connected-host="connectedHost || host"
      :connected-port="connectedPort || port"
      :connected-database="connectedDatabase || database"
      :show-close-button="true"
      close-label="Logout"
      @close="logoutPendingManagementSession"
    />
  </template>

  <template v-else-if="showLoginCredentialsPage && pendingLogin && isPendingAdmin">
    <LoginCredentialsPage
      :user="pendingLoginUser"
      :login-user-label="pendingLoginUserLabel"
      :connected-host="connectedHost || host"
      :connected-port="connectedPort || port"
      :connected-database="connectedDatabase || database"
      @close="showLoginCredentialsPage = false"
    />
  </template>

  <template v-else-if="!isAuthenticated">
    <section class="card login-card app-login-card">
      <div class="app-login-header">
        <div>
          <p class="eyebrow">Schritt 2</p>
          <h2>Login in die App</h2>
          <p class="app-login-intro">Melde dich mit deinem Benutzerkonto an, um auf die freigegebenen Dashboards zuzugreifen.</p>
        </div>

        <div class="login-status-chip" :class="{ 'login-status-chip-success': !!pendingLogin }">
          <i :class="pendingLogin ? 'bi bi-person-check' : 'bi bi-person'"></i>
          <span>{{ pendingLogin ? "Login bestaetigt" : "Nicht angemeldet" }}</span>
        </div>
      </div>

      <div class="login-form app-login-form">
        <div class="login-fields-row">
          <label class="field-block field-fixed-240">
            <span class="field-label">Benutzername</span>
            <input
              v-model="loginUsername"
              autocomplete="username"
              :disabled="!!pendingLogin"
              @keyup.enter="login"
            />
          </label>

          <label class="field-block field-fixed-240">
            <span class="field-label">Passwort</span>
            <input
              type="password"
              v-model="loginPassword"
              autocomplete="current-password"
              :disabled="!!pendingLogin"
              @keyup.enter="login"
            />
          </label>
        </div>

        <div class="login-actions">
          <button class="btn-secondary" @click="backToDatabaseConnect" :disabled="loginLoading" type="button">
            Zurück
          </button>

          <button v-if="!pendingLogin" class="btn-primary" @click="login" :disabled="loginLoading" type="button">
            {{ loginLoading ? "Anmelden..." : "Anmelden" }}
          </button>

          <button v-else class="btn-primary" @click="continueAfterLogin" :disabled="loginLoading" type="button">
            Weiter zum Dashboard
          </button>

          <button
            v-if="pendingLogin && isPendingAdmin"
            class="btn-secondary login-manage-users-btn"
            type="button"
            @click="showLoginCredentialsPage = true"
          >
            Anmeldedaten
          </button>

          <button
            v-if="pendingLogin && isPendingAdmin"
            class="btn-secondary login-manage-users-btn"
            type="button"
            @click="showAppManagement = true"
          >
            Dashboard-Verwaltung
          </button>
        </div>

        <div v-if="loginError" class="feedback-panel feedback-panel-error">
          <p class="feedback-title">Login fehlgeschlagen</p>
          <p class="error">{{ loginError }}</p>
        </div>

        <div v-if="pendingLogin" class="feedback-panel feedback-panel-success">
          <p class="feedback-title">Anmeldung erfolgreich</p>
          <p>
            Angemeldet als {{ pendingLoginUserLabel || "Benutzer" }}.
            Wähle jetzt <strong>Weiter zum Dashboard</strong>.
          </p>
        </div>
      </div>
    </section>
  </template>

  <template v-else>
    <header class="header header-auth-row">
      <div>
        <h1>Dashboard</h1>
        <p>Dashboard-Ansicht nach Login.</p>
      </div>
      <UserSessionCard      
        :user-label="currentUserLabel"
        :connected-host="connectedHost || host"
        :connected-port="connectedPort || port"
        :connected-database="connectedDatabase || database"
        action-label="Logout"
        @action="logout"
      />
    </header>

    <DashboardFiltersPanel
      v-model:snapshot-name-selection="snapshotNameSelection"
      v-model:school-term-selection="schoolTermSelection"
      v-model:selected-city="selectedCity"
      v-model:selected-snr="selectedSnr"
      :snapshot-name-options="snapshotNameOptions"
      :school-term-options="schoolTermOptions"
      :cities="cities"
      :schools-filtered-for-dropdown="schoolsFilteredForDropdown"
      :summary-items="dashboardSummaryItems"
      :error-message="dashboardErrorMessage"
    />

    <DashboardTabs
      v-model="view"
      :tabs="dashboardTabs"
    />

  <!-- ===== Dashboard 1 ===== -->
  <!-- ===== Dashboard 2 ===== -->
  <ClassStrengthDashboard
    v-if="view === 'klassenstaerken'"
    v-model:lower-threshold="lowerThreshold"
    v-model:upper-threshold="upperThreshold"
    :class-codes="classCodes"
    :class-rows-count="classRows.length"
    :error="errorClasses"
    :grand-total-classes="grandTotalClasses"
    :schools-in-class-matrix="schoolsInClassMatrix"
    :get-class-header-label="getClassHeaderLabel"
    :get-class-students="getClassStudents"
    :total-for-class="totalForClass"
    :total-for-school="totalForSchool"
    :class-cell-class="classCellClass"
  />

  <!-- ===== Dashboard 4 Uebersicht ===== -->
  <OverviewDashboard
    v-if="view === 'uebersicht'"
    :selected-snapshot="selectedSnapshotForOverview"
    :overview="overview"
    :total-students-overview="totalStudentsOverview"
    :special-needs-overview="specialNeedsOverview"
    :special-needs-percent-overview="specialNeedsPercentOverview"
    :ef-overview="efOverview"
    :ef-percent-overview="efPercentOverview"
    :migration-percent-overview="migrationPercentOverview"
    :nationality-percent-overview="nationalityPercentOverview"
    :h-track-percent-overview="hTrackPercentOverview"
    :gender-chart-option="genderChartOption"
    :grade-chart-option="gradeChartOption"
    :support-chart-option="supportChartOption"
    :ef-chart-option="efChartOption"
    :migration-chart-option="migrationChartOption"
    :nationality-chart-option="nationalityChartOption"
    :religion-chart-option="religionChartOption"
    :education-track-chart-option="educationTrackChartOption"
    :h-track-grade-chart-option="hTrackGradeChartOption"
  />

  <StudentNumbersDashboard
    v-if="view === 'schuelerzahlen'"
    :selected-snapshot="selectedSnapshotForOverview"
    :loading="loadingOverview"
    :error="errorOverview"
    :school-trend-series-count="schoolTrendSeriesCount"
    :school-trend-chart-option="schoolTrendChartOption"
    :cumulative-school-trend-chart-option="cumulativeSchoolTrendChartOption"
    :ef-trend-chart-option="efTrendChartOption"
    :ef-trend-rows="efTrendRows"
    :school-trend-terms="schoolTrendTerms"
    :school-trend-schools="schoolTrendSchools"
    :get-school-trend-students="getSchoolTrendStudents"
  />

  <!-- ===== Dashboard: Lehrerdaten ===== -->
  <TeachersDashboard
    v-if="view === 'lehrerdaten'"
    :active-snapshot-selection="activeSnapshotSelection"
    :loading="loadingTeachers"
    :error="errorTeachers"
    :total-teachers="teachersData?.totalTeachers || 0"
    :teacher-sex-chart-option="teacherSexChartOption"
    :teacher-age-chart-option="teacherAgeChartOption"
    :teacher-nation-chart-option="teacherNationChartOption"
    :teacher-city-chart-option="teacherCityChartOption"
  />

  <!-- ===== Dashboard 3 DAZ ===== -->
  <DazDashboard
    v-if="view === 'daz'"
    v-model:daz-lower-threshold="dazLowerThreshold"
    v-model:daz-upper-threshold="dazUpperThreshold"
    :daz-class-codes="dazClassCodes"
    :daz-rows-count="dazRows.length"
    :error="errorDaz"
    :grand-total-daz="grandTotalDaz"
    :schools-in-daz-matrix="schoolsInDazMatrix"
    :get-daz="getDaz"
    :get-daz-class-header-label="getDazClassHeaderLabel"
    :total-daz-for-class="totalDazForClass"
    :total-daz-for-school="totalDazForSchool"
    :daz-cell-class="dazCellClass"
  />
</template>
</div>

<div class="page">
  <template v-if="showDatabaseConnectStep">
    <DatabaseConnectPanel
      v-model:host="host"
      v-model:port="port"
      v-model:database="database"
      v-model:db-user="dbUsername"
      v-model:db-password="dbPassword"
      :error="error"
      :error-details="errorDetails"
      :error-code="errorCode"
      :connecting="connecting"
      :server-connected="serverConnected"
      :server-status="serverStatus"
      @connect="connectDatabase"
      @continue="continueAfterDatabaseConnect"
    />
  </template>

  <template v-else-if="showAppManagement && pendingLogin && isPendingAdmin">
    <APPManagement
      :token="pendingLogin?.token || ''"
      :user="pendingLoginUser"
      :connected-host="connectedHost || host"
      :connected-port="connectedPort || port"
      :connected-database="connectedDatabase || database"
      :show-close-button="true"
      close-label="Logout"
      @close="logoutPendingManagementSession"
    />
  </template>

  <template v-else-if="!isAuthenticated">
    <section class="card login-card app-login-card">
      <div class="app-login-header">
        <div>
          <p class="eyebrow">Schritt 2</p>
          <h2>Login in die App</h2>
          <p class="app-login-intro">Melde dich mit deinem Benutzerkonto an, um auf die freigegebenen Dashboards zuzugreifen.</p>
        </div>

        <div class="login-status-chip" :class="{ 'login-status-chip-success': !!pendingLogin }">
          <i :class="pendingLogin ? 'bi bi-person-check' : 'bi bi-person'"></i>
          <span>{{ pendingLogin ? "Login bestaetigt" : "Nicht angemeldet" }}</span>
        </div>
      </div>

      <div class="login-form app-login-form">
        <div class="login-fields-row">
          <label class="field-block field-fixed-240">
            <span class="field-label">Benutzername</span>
            <input
              v-model="loginUsername"
              autocomplete="username"
              :disabled="!!pendingLogin"
              @keyup.enter="login"
            />
          </label>

          <label class="field-block field-fixed-240">
            <span class="field-label">Passwort</span>
            <input
              type="password"
              v-model="loginPassword"
              autocomplete="current-password"
              :disabled="!!pendingLogin"
              @keyup.enter="login"
            />
          </label>
        </div>

        <div class="login-actions">
          <button class="btn-secondary" @click="backToDatabaseConnect" :disabled="loginLoading" type="button">
            Zurück
          </button>

          <button v-if="!pendingLogin" class="btn-primary" @click="login" :disabled="loginLoading" type="button">
            {{ loginLoading ? "Anmelden..." : "Anmelden" }}
          </button>

          <button v-else class="btn-primary" @click="continueAfterLogin" :disabled="loginLoading" type="button">
            Weiter zum Dashboard
          </button>

          <button
            v-if="pendingLogin && isPendingAdmin"
            class="btn-secondary login-manage-users-btn"
            type="button"
            @click="showAppManagement = true"
          >
            Dashboard-Verwaltung
          </button>
        </div>

        <div v-if="loginError" class="feedback-panel feedback-panel-error">
          <p class="feedback-title">Login fehlgeschlagen</p>
          <p class="error">{{ loginError }}</p>
        </div>

        <div v-if="pendingLogin" class="feedback-panel feedback-panel-success">
          <p class="feedback-title">Anmeldung erfolgreich</p>
          <p>
            Angemeldet als {{ pendingLoginUserLabel || "Benutzer" }}.
            Wähle jetzt <strong>Weiter zum Dashboard</strong>.
          </p>
        </div>
      </div>
    </section>
  </template>

  <template v-else>
    <header class="header header-auth-row">
      <div>
        <h1>Dashboard</h1>
        <p>Dashboard-Ansicht nach Login.</p>
      </div>
      <div class="header-auth-panel">
        <div class="header-auth-summary">
          <div class="header-auth-topline">
            <p class="header-auth-user">User {{ currentUserLabel || "Nutzer" }}</p>
            <button class="btn-secondary header-auth-logout" type="button" @click="logout">Logout</button>
          </div>
          <div class="header-auth-meta">
            <span class="header-auth-badge">
              <i class="bi bi-hdd-network"></i>
              {{ connectedHost || host }}:{{ connectedPort || port }}
            </span>
            <span class="header-auth-badge">
              <i class="bi bi-database"></i>
              {{ connectedDatabase || database }}
            </span>
          </div>
        </div>
      </div>
    </header>



  <section class="card">
    <div class="controls-card">
      <div class="controls">
        <label class="filter-medium">
          Snapshot
          <select v-model="snapshotNameSelection" :disabled="!snapshotNameOptions.length">
            <option value="" disabled>(bitte waehlen)</option>
            <option
              v-for="option in snapshotNameOptions"
              :key="'snapshot-name-' + option.value"
              :value="option.value"
            >
              {{ option.label }}
            </option>
          </select>
        </label>

        <label class="filter-term">
          Schuljahr
          <select v-model="schoolTermSelection" :disabled="!schoolTermOptions.length">
            <option value="" disabled>(bitte waehlen)</option>
            <option
              v-for="option in schoolTermOptions"
              :key="'term-' + option.value"
              :value="option.value"
            >
              {{ option.label }}
            </option>
          </select>
        </label>

        <label class="filter-medium">
          Ort
          <select v-model="selectedCity">
            <option value="">(alle)</option>
            <option v-for="c in cities" :key="c" :value="c">
              {{ c }}
            </option>
          </select>
        </label>

        <label class="filter-large">
          Schule
          <select v-model="selectedSnr">
            <option value="">(alle)</option>
            <option v-for="s in schoolsFilteredForDropdown" :key="s.snr" :value="s.snr">
              {{ s.snr }} - {{ s.name }}
            </option>
          </select>
        </label>
      </div>
    </div>

      <div class="summary">

      <template v-if="view === 'klassenstaerken'">
        <div><b>Schulen:</b> {{ schoolsInClassMatrix.length }}</div>
        <div><b>Klassen:</b> {{ classCodes.length }}</div>
      </template>
      <template v-if="view === 'daz'">
        <div><b>Schulen:</b> {{ schoolsInDazMatrix.length }}</div>
        <div><b>Klassen:</b> {{ dazClassCodes.length }}</div>
      </template>
      <template v-if="view === 'uebersicht'">
        <div><b>Schulen:</b> {{ schoolsInOverviewSnapshot }}</div>
        <div><b>Schüler:</b> {{ totalStudentsOverview }}</div>
      </template>
      <template v-if="view === 'schuelerzahlen'">
        <div><b>Schulen:</b> {{ schoolsInOverviewSnapshot }}</div>
        <div><b>Schüler:</b> {{ totalStudentsOverview }}</div>
      </template>
      <template v-if="view === 'lehrerdaten'">
        <div><b>Schulen:</b> {{ teachersData?.schoolCount || 0 }}</div>
        <div><b>Lehrer Gesamt:</b> {{ teachersData?.totalTeachers || 0 }}</div>
      </template>
    </div>

    <div v-if="view === 'klassenstaerken' && errorClasses" class="error">{{ errorClasses }}</div>
    <div v-if="view === 'uebersicht' && errorOverview" class="error">{{ errorOverview }}</div>
    <div v-if="view === 'schuelerzahlen' && errorOverview" class="error">{{ errorOverview }}</div>
  </section>

  <nav class="tabs">
    <button
      v-if="canViewDashboard('uebersicht')"
      class="tab"
      :class="{ active: view === 'uebersicht' }"
      @click="view = 'uebersicht'">
      {{ dashboardLabel("uebersicht") }}
    </button>
    <button
      v-if="canViewDashboard('schuelerzahlen')"
      class="tab"
      :class="{ active: view === 'schuelerzahlen' }"
      @click="view = 'schuelerzahlen'">
      {{ dashboardLabel("schuelerzahlen") }}
    </button>
    <button
      v-if="canViewDashboard('klassenstaerken')"
      class="tab"
      :class="{ active: view === 'klassenstaerken' }"
      @click="view = 'klassenstaerken'">
      {{ dashboardLabel("klassenstaerken") }}
    </button>
    <button
      v-if="canViewDashboard('daz')"
      class="tab"
      :class="{ active: view === 'daz' }"
      @click="view = 'daz'">
      {{ dashboardLabel("daz") }}
    </button>
    <button
      v-if="canViewDashboard('lehrerdaten')"
      class="tab"
      :class="{ active: view === 'lehrerdaten' }"
      @click="view = 'lehrerdaten'">
      {{ dashboardLabel("lehrerdaten") }}
    </button>
  </nav>

  <!-- ===== Dashboard 1 ===== -->
  <!-- ===== Dashboard 2 ===== -->
  <section v-if="view === 'klassenstaerken'" class="card">
    <div class="row">
      <h2>Klassenstaerken je Schule (Matrix)</h2>

      <div class="row-right">

        <label class="inline">
          Untergrenze einfaerben
          <input type="number" min="1" :max="upperThreshold - 1" v-model.number="lowerThreshold" class="threshold-input threshold-low" />
        </label>

        <label class="inline">
          Obergrenze einfaerben
          <input type="number" :min="lowerThreshold + 1" max="45" v-model.number="upperThreshold" class="threshold-input threshold-high" />
        </label>

      </div>



    </div>

    <div v-if="!classRows.length" class="hint">
      Keine Klassendaten fuer die aktuelle Auswahl.
    </div>

    <div v-else class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th class="col-city">Ort</th>
            <th class="col-snr">SNR</th>
            <th class="name">Schule</th>

            <th v-for="c in classCodes" :key="c" class="num" :title="c">{{ getClassHeaderLabel(c) }}</th>

            <th class="num total">Summe</th>
          </tr>
        </thead>

        <tbody>
          <tr v-for="s in schoolsInClassMatrix" :key="s.snr">
            <td class="col-city">{{ s.city || "-" }}</td>
            <td class="col-snr">{{ s.snr }}</td>
            <td class="name" :title="s.name">{{ s.name || "-" }}</td>

            <td v-for="c in classCodes" :key="s.snr + '-' + c" class="num"
              :class="classCellClass(getClassStudents(s.snr, c))">
              {{ getClassStudents(s.snr, c) }}
            </td>

            <td class="num total"><b>{{ totalForSchool(s.snr) }}</b></td>
          </tr>
        </tbody>

        <tfoot>
          <tr>
            <td colspan="3"><b>Summe</b></td>

            <td v-for="c in classCodes" :key="'sum-' + c" class="num total-cell">
              <b>{{ totalForClass(c) }}</b>
            </td>

            <td class="num total">{{ grandTotalClasses }}</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </section>

  <!-- ===== Dashboard 4 Uebersicht ===== -->
  <section v-if="view === 'uebersicht'" class="card">
    <div class="row">
      <h2>Uebersicht</h2>
    </div>

    <div v-if="!selectedSnapshotForOverview" class="hint">
      Bitte Snapshot waehlen.
    </div>

    <div v-else class="overview-grid">
      <article class="overview-card">
        <h3 class="overview-title-light">Gesamtschuelerzahl: {{ totalStudentsOverview }}</h3>
        <EChartPanel :option="genderChartOption" />
      </article>

      <article class="overview-card">
        <h3 class="overview-title-light">Jahrgaenge</h3>
        <EChartPanel :option="gradeChartOption" />
      </article>

      <article class="overview-card">
        <h3 class="overview-title-light">Foerderbedarf: 
                  {{ specialNeedsOverview }} von {{ totalStudentsOverview }} SuS =     {{ specialNeedsPercentOverview }}%
        </h3>
        <EChartPanel :option="supportChartOption" />
      </article>

      <article class="overview-card">
        <h3 class="overview-title-light">Erstfoerderung:
                  {{ efOverview }} von {{ totalStudentsOverview }} SuS =     {{ efPercentOverview }}%
        </h3>
        <EChartPanel :option="efChartOption" />
      </article>



      <article class="overview-card ">
        <h3 class="overview-title-light">Migrationshintergrund: {{ migrationPercentOverview }}%</h3>
        <EChartPanel :option="migrationChartOption" />
      </article>

      <article class="overview-card ">
        <h3 class="overview-title-light">Staatsangehoerigkeiten: {{ nationalityPercentOverview }}% deutsch
        </h3>
        <EChartPanel :option="nationalityChartOption" />
      </article>

      <article class="overview-card overview-card-half">
        <h3 class="overview-title-light">Konfessionen</h3>
        <EChartPanel :option="religionChartOption" />
      </article>

      <article class="overview-card overview-card-half">
        <h3 class="overview-title-light">Anteil SuS in §132c: {{ hTrackPercentOverview }}%</h3>
        <EChartPanel :option="educationTrackChartOption" />
      </article>

      <article class="overview-card overview-card-half">
        <h3 class="overview-title-light">H (§132c an RS) je Jahrgang</h3>
        <EChartPanel :option="hTrackGradeChartOption" />
      </article>

    </div>
  </section>

  <section v-if="view === 'schuelerzahlen'" class="card">
    <div class="row">
      <h2>Schuelerzahlen</h2>
    </div>

    <div v-if="!selectedSnapshotForOverview" class="hint">
      Bitte Snapshot waehlen.
    </div>

    <div v-else-if="loadingOverview" class="hint">
      Lade Schuelerzahlen...
    </div>

    <div v-else-if="errorOverview" class="error">
      {{ errorOverview }}
    </div>

    <div v-else-if="!schoolTrendSeriesCount" class="hint">
      Keine Schuelerzahl-Trends fuer die aktuelle Auswahl.
    </div>

    <div v-else class="overview-grid">
      <article class="overview-card overview-card-half">
        <h3 class="overview-title-light">Schuelerzahlen je Schule und Abschnitt</h3>
        <EChartPanel :option="schoolTrendChartOption" />
      </article>
      <article class="overview-card overview-card-half">
        <h3 class="overview-title-light">Schuelerzahlen gesamt je Abschnitt</h3>
        <EChartPanel :option="cumulativeSchoolTrendChartOption" />
      </article>

      <article class="overview-card overview-card-full">
        <h3 class="overview-title-light">Schuelerzahlen je Schule und Abschnitt (Tabelle)</h3>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th class="col-snr">SNR</th>
                <th class="name">Schule</th>
                <th v-for="t in schoolTrendTerms" :key="'schuelerzahlen-term-' + t.termId" class="num">
                  {{ t.termLabel }}
                </th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="s in schoolTrendSchools" :key="'schuelerzahlen-school-' + s.snr">
                <td class="col-snr">{{ s.snr }}</td>
                <td class="name" :title="s.name">{{ s.name || '-' }}</td>
                <td v-for="t in schoolTrendTerms" :key="'schuelerzahlen-cell-' + s.snr + '-' + t.termId" class="num">
                  {{ getSchoolTrendStudents(s.snr, t.termId) || '-' }}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </article>

      <article class="overview-card overview-card-wide2">
        <h3 class="overview-title-light">Entwicklung DAZ-Schueler (EF = 1)</h3>
        <EChartPanel :option="efTrendChartOption" />
      </article>
    </div>
  </section>

  <!-- ===== Dashboard: Lehrerdaten ===== -->
  <section v-if="view === 'lehrerdaten'" class="card">
    <div class="row">
      <h2>Lehrerdaten</h2>
    </div>

    <div v-if="!activeSnapshotSelection" class="hint">
      Bitte Snapshot waehlen.
    </div>
    <div v-else-if="loadingTeachers" class="hint">
      Lade Lehrerdaten...
    </div>
    <div v-else-if="errorTeachers" class="error">
      {{ errorTeachers }}
    </div>

    <div v-else class="overview-grid">
      <article class="overview-card">
        <h3 class="overview-title-light">Gesamtlehrerzahl: {{ teachersData?.totalTeachers || 0 }}</h3>
        <EChartPanel :option="teacherSexChartOption" />
      </article>

      <article class="overview-card">
        <h3 class="overview-title-light">Altersstruktur</h3>
        <EChartPanel :option="teacherAgeChartOption" />
      </article>

      <article class="overview-card">
        <h3 class="overview-title-light">Nationalität</h3>
        <EChartPanel :option="teacherNationChartOption" />
      </article>

      <article class="overview-card overview-card-wide2">
        <h3 class="overview-title-light">Wohnorte (Top 10)</h3>
        <EChartPanel :option="teacherCityChartOption" />
      </article>
    </div>
  </section>

  <!-- ===== Dashboard 3 DAZ ===== -->
  <section v-if="view === 'daz'" class="card">
    <div class="row">
      <h2>DAZ (SuS in Erstfoerderung je Klasse)</h2>

      <div class="row-right">
        <!-- Falls du Schwellen + Einfaerbung auch im DAZ willst:
           Dann kannst du hier Unter-/Obergrenze ebenfalls anzeigen.
           (optional, sag Bescheid, dann fuege ich sie sauber ein) -->

        <label class="inline">
          Untergrenze einfaerben
          <input type="number" min="1" :max="dazUpperThreshold - 1" v-model.number="dazLowerThreshold" class="threshold-input threshold-low" />
        </label>

        <label class="inline">
          Obergrenze einfaerben
          <input type="number" :min="dazLowerThreshold + 1" max="45" v-model.number="dazUpperThreshold" class="threshold-input threshold-high" />
        </label>
      </div>
    </div>

    <div v-if="errorDaz" class="error">{{ errorDaz }}</div>

    <div v-if="!dazRows.length" class="hint">
      Keine DAZ-Daten fuer die aktuelle Auswahl.
    </div>

    <div v-else class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th class="col-city">Ort</th>
            <th class="col-snr">SNR</th>
            <th class="name">Schule</th>

            <th v-for="c in dazClassCodes" :key="c" class="num" :title="c">{{ getDazClassHeaderLabel(c) }}</th>
            <th class="num total">Summe</th>
          </tr>
        </thead>

        <tbody>
          <tr v-for="s in schoolsInDazMatrix" :key="s.snr">
            <td class="col-city">{{ s.city || "-" }}</td>
            <td class="col-snr">{{ s.snr }}</td>
            <td class="name">{{ s.name || "-" }}</td>

            <td v-for="c in dazClassCodes" :key="s.snr + '-' + c" class="num" :class="dazCellClass(getDaz(s.snr, c))">
              {{ getDaz(s.snr, c) }}
            </td>

            <td class="num total"><b>{{ totalDazForSchool(s.snr) }}</b></td>
          </tr>
        </tbody>

        <tfoot>
          <tr>
            <td colspan="3"><b>Summe</b></td>

            <td v-for="c in dazClassCodes" :key="'sumdaz-' + c" class="num total">
              <b>{{ totalDazForClass(c) }}</b>
            </td>

            <td class="num total"><b>{{ grandTotalDaz }}</b></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </section>
</template>
</div>

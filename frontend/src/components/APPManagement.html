<section class="app-management">
  <div class="app-management-header">
    <div>
      <p class="app-management-eyebrow">Dashboard-Verwaltung</p>
      <h2>App-Verwaltung</h2>
      <p class="app-management-intro">
        Verwalte Benutzer, Gruppen und Schulen mit dem aktuell angemeldeten Admin-Konto.
      </p>
    </div>

    <div class="app-management-side">
      <UserSessionCard
        v-if="user || connectedHost || connectedPort || connectedDatabase"
        class="app-management-session"
        :user="user"
        :connected-host="connectedHost"
        :connected-port="connectedPort"
        :connected-database="connectedDatabase"
        :action-label="showCloseButton ? closeLabel : ''"
        @action="emit('close')"
      />
    </div>
  </div>

  <div v-if="!isAdminUser" class="app-management-empty">
    Diese Verwaltung ist nur fuer Admin-Konten verfuegbar.
  </div>

  <UserManagementPanel
    v-else
    :management-token="token"
    :management-user="user"
    :embedded="true"
  />
</section>

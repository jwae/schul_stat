services:
  mariadb:
    image: mariadb:11.4
    container_name: schul-stat-mariadb
    restart: unless-stopped
    env_file:
      - .env.docker
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./DB/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - schul-stat-net

  backend:
    build:
      context: ./backend
    container_name: schul-stat-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/connection/status"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - schul-stat-net

  frontend:
    build:
      context: ./frontend
    container_name: schul-stat-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - schul-stat-net

volumes:
  mariadb_data:

networks:
  schul-stat-net:
    driver: bridge
